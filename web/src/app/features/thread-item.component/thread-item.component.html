<div class="border-b threado-border p-4 hover:bg-gray-50 dark:hover:bg-white/[0.02] transition-colors cursor-pointer group/thread">

  <div class="flex items-center gap-3">
    <div class="flex-shrink-0">
      <app-threado-avatar
        size="3rem"
        [avatarUrl]="thread()?.author?.avatarUrl"
      ></app-threado-avatar>
    </div>

    <div class="flex flex-col overflow-hidden">
      <div class="flex items-center gap-1 truncate">
        <span class="font-bold text-black dark:text-white hover:underline truncate">
          {{ thread()?.author?.name }}
        </span>

        @if (thread()?.author?.verified) {
          <svg class="w-4 h-4 text-blue-500 fill-current" viewBox="0 0 24 24">
            <path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.154-.435.238-.905.238-1.4 0-2.21-1.79-4-4-4-.495 0-.965.084-1.4.238C14.55 2.465 13.18 1.59 11.6 1.59c-1.58 0-2.95.875-3.6 2.148-.435-.154-.905-.238-1.4-.238-2.21 0-4 1.79-4 4 0 .495.084.965.238 1.4-1.273.65-2.148 2.02-2.148 3.6 0 1.58.875 2.95 2.148 3.6-.154.435-.238.905-.238 1.4 0 2.21 1.79 4 4 4 .495 0 .965-.084 1.4-.238.65 1.273 2.02 2.148 3.6 2.148 1.58 0 2.95-.875 3.6-2.148.435.154.905.238 1.4.238 2.21 0 4-1.79 4-4 0-.495-.084-.965-.238-1.4 1.273-.65 2.148-2.02 2.148-3.6zm-10.65 4.88l-4.14-4.14 1.41-1.41 2.73 2.73 6.13-6.13 1.41 1.41-7.54 7.54z"></path>
          </svg>
        }
      </div>

      <span class="text-gray-500 text-sm truncate">
        @{{ thread()?.author?.username }}
      </span>
    </div>
  </div>

  <div class="mt-2">

    <div
      class="text-black dark:text-white text-[15px] leading-relaxed whitespace-pre-wrap"
      [innerHTML]="thread()?.text | linkify">
    </div>

<!--    @if (imageUrls().length > 0) {-->
<!--      <div class="mt-3 rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-800 bg-gray-100 dark:bg-gray-900/50">-->
<!--        <img [src]="imageUrls()[0].url"-->
<!--             alt="Thread image"-->
<!--             class="w-full h-auto object-cover max-h-[512px] hover:scale-[1.01] transition-transform duration-500">-->
<!--      </div>-->
<!--    }-->

    <div class="mt-3 w-full flex justify-around -ml-2 text-gray-500">

      <app-threado-action-button
        [icon]="MessageCircleIcon"
        variant="accent"
        [count]="thread()?.publicMetrics?.replyCount || 0">
      </app-threado-action-button>

      <app-threado-action-button
        [icon]="RepeatIcon"
        variant="green"
        [count]="thread()?.publicMetrics?.retweetCount || 0">
      </app-threado-action-button>

      <app-threado-action-button
        [icon]="HeartIcon"
        variant="red"
        [count]="thread()?.publicMetrics?.likeCount || 0">
      </app-threado-action-button>

      <app-threado-action-button
        [icon]="BookmarkIcon"
        variant="blue"
        [count]="thread()?.publicMetrics?.bookmarkCount || 0">
      </app-threado-action-button>

    </div>
  </div>

</div>
