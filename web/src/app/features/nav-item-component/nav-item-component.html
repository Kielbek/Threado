<a [routerLink]="item().route"
   routerLinkActive #rla="routerLinkActive"
   (click)="clicked.emit()"
   class="group flex items-center gap-5 px-4 py-3 rounded-full transition-all hover:bg-gray-100 dark:hover:bg-white/5 w-full cursor-pointer"
   [ngClass]="rla.isActive
     ? 'text-black dark:text-white'
     : 'text-gray-500 hover:text-gray-800 dark:hover:text-gray-300'">

  <lucide-icon
    [img]="item().icon"
    class="w-7 h-7 transition-all flex-shrink-0">
  </lucide-icon>

  <span class="text-xl transition-all">
    {{ item().label }}
  </span>
</a>
