<a [routerLink]="item().route"
   routerLinkActive #rla="routerLinkActive"
   (click)="clicked.emit()"
   class="group flex items-center gap-5 px-4 py-3 rounded-full transition-all hover:bg-white/5 w-full cursor-pointer">

  <lucide-icon
    [img]="item().icon"
    [strokeWidth]="rla.isActive ? 3 : 2"
    class="w-7 h-7 transition-all flex-shrink-0"
    [ngClass]="{
    'text-threado': rla.isActive,
    'text-white group-hover:text-threado': !rla.isActive
  }"
  >
  </lucide-icon>

  <span class="text-xl transition-all group-hover:text-white"
        [class.font-bold]="rla.isActive"
        [class.text-[#32cd32]]="rla.isActive"
        [class.text-gray-300]="!rla.isActive">
        {{ item().label }}
  </span>
</a>
