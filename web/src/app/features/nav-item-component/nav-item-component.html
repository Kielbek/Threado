<a [routerLink]="item().route"
   routerLinkActive #rla="routerLinkActive"
   (click)="clicked.emit()"
   class="group flex items-center gap-4 px-4 py-3 rounded-full transition-all w-full cursor-pointer hover:bg-gray-100 dark:hover:bg-white/10"
   [ngClass]="rla.isActive
     ? 'text-[var(--color-threado-accent)] font-bold'
     : 'text-black dark:text-white  font-medium'">

  <div class="relative flex-shrink-0">
    <lucide-icon
      [img]="item().icon"
      class="w-6 h-6 transition-transform group-active:scale-95 group-hover:scale-105">
    </lucide-icon>

    @if (item().showDot) {
      <div class="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full bg-[var(--color-threado-accent)] ring-2 ring-white dark:ring-black"></div>
    }
  </div>

  <span class="text-lg truncate">
    {{ item().label }}
  </span>
</a>
