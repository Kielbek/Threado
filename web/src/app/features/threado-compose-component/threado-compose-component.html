@if (isDraggingAnywhere) {
  <div class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm transition-opacity duration-300 pointer-events-none"></div>
}

<div
  class="mx-auto w-full pb-20 lg:pb-0 relative transition-all duration-300"
  [ngClass]="{'z-50': isDraggingAnywhere}"
>
  <div
    class="p-4 transition-all duration-300 relative"
    [ngClass]="{
      'border-2 border-dashed border-[#32cd32]/60': isDraggingAnywhere && !isDraggingOverComponent,
      'border-2 border-dashed border-[#32cd32] outline outline-2 outline-offset-4 outline-[#32cd32] bg-[#32cd32]/10 shadow-[0_0_20px_rgba(50,205,50,0.2)]': isDraggingOverComponent,
      'border-b border-[#32cd32]/20': !isDraggingAnywhere
    }"
  >

    @if (isDraggingAnywhere) {
      <div
        class="absolute inset-0 z-50 rounded-xl"
        (dragenter)="onComponentDragEnter($event)"
        (dragleave)="onComponentDragLeave($event)"
        (dragover)="$event.preventDefault()"
        (drop)="onComponentDrop($event)"
      >
        @if (isDraggingOverComponent) {
          <div class="w-full h-full flex items-center justify-center pointer-events-none rounded-xl">
            <div class="bg-black/80 text-[#32cd32] font-semibold px-6 py-3 rounded-full backdrop-blur-md border border-[#32cd32]/50 scale-105 transition-transform">
              Upuść zdjęcie tutaj
            </div>
          </div>
        }
      </div>
    }

    <div class="space-x-4">
      <div class="flex items-center gap-2.5">
        <app-threado-avatar></app-threado-avatar>
        <div class="flex flex-col mb-1">
          <span class="text-white font-bold leading-tight">Mateusz</span>
          <span class="text-gray-500 text-sm">@mateusz_dev</span>
        </div>
      </div>

      <div class="flex w-full flex-col space-y-3">
        <div class="relative mt-4">
         <textarea
           [(ngModel)]="content"
           (input)="autoResize($event)"
           (focus)="expandForm()"
           class="w-full resize-none border-0 bg-transparent p-0 text-lg text-white focus:ring-0 outline-none overflow-hidden relative z-10"
           placeholder="Co tam na Twoim Threadzie?"
           rows="2"
           id="compose-textarea"></textarea>
        </div>

        @if (selectedImage()) {
          <div class="relative mt-2 group overflow-hidden rounded-2xl border border-[#32cd32]/30 shadow-lg">
            <button
              (click)="removeImage()"
              type="button"
              class="absolute top-3 left-3 bg-black/60 hover:bg-black/80 text-white rounded-full p-2 transition z-10 backdrop-blur-sm">
              <lucide-icon [img]="XIcon" class="h-4 w-4"></lucide-icon>
            </button>
            <img [src]="selectedImage()"
                 class="max-h-[450px] w-full object-cover transition duration-300 group-hover:scale-[1.01]"
                 alt="Podgląd załącznika">
          </div>
        }

        <div
          class="grid transition-all duration-300 ease-out relative"
          [ngClass]="isExpanded() ? 'grid-rows-[1fr] mt-1' : 'grid-rows-[0fr] mt-0 pointer-events-none'"
        >
          <div [ngClass]="isExpanded() ? 'overflow-visible' : 'overflow-hidden'">
            <div
              class="flex items-center justify-between pt-3 transition-transform duration-300 ease-out"
              [ngClass]="isExpanded() ? 'translate-y-0' : '-translate-y-full'"
            >
              <div class="flex space-x-1 relative">

                <button
                  (click)="fileInput.click()"
                  type="button"
                  class="rounded-full p-2 text-white hover:text-[#32cd32] hover:bg-[#32cd32]/10 transition cursor-pointer"
                  title="Dodaj zdjęcie">
                  <lucide-icon [img]="PaperclipIcon" class="h-5 w-5"></lucide-icon>
                </button>

                <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">

                <div class="relative">
                  <button
                    (click)="toggleEmojiPicker($event)"
                    type="button"
                    class="rounded-full p-2 text-white hover:text-[#32cd32] hover:bg-[#32cd32]/10 transition cursor-pointer"
                    title="Emoji">
                    <lucide-icon [img]="SmileIcon" class="h-5 w-5"></lucide-icon>
                  </button>

                  @if (isEmojiPickerVisible) {
                    <div class="absolute top-full mt-2 left-0 z-[100] shadow-2xl rounded-xl border border-[#32cd32]/30 bg-black">
                      <emoji-mart
                        (emojiClick)="addEmoji($event)"
                        [darkMode]="true"
                        color="#32cd32"
                        title="Wybierz emoji"
                        emoji="smile"
                        [emojiSize]="20"
                        [perLine]="7">
                      </emoji-mart>
                    </div>
                  }
                </div>

              </div>

              <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2">
          <span class="text-xs transition-colors" [ngClass]="isOverLimit() ? 'text-red-500' : 'text-gray-500'">
            {{ characterCount() }} / {{ MAX_CHARS }}
          </span>
                  <svg width="20" height="20" viewBox="0 0 20 20" class="transform -rotate-90">
                    <circle class="stroke-gray-800" cx="10" cy="10" r="8" fill="none" stroke-width="2"></circle>
                    <circle
                      [ngClass]="isNearLimit() ? (isOverLimit() ? 'stroke-red-500' : 'stroke-yellow-500') : 'stroke-[#32cd32]'"
                      cx="10" cy="10" r="8" fill="none" stroke-width="2"
                      style="stroke-dasharray: 50.26; transition: stroke-dashoffset 0.2s ease, stroke 0.2s ease;"
                      [style.stroke-dashoffset]="progressOffset()">
                    </circle>
                  </svg>
                </div>

                <app-thread-button
                  (click)="submitPost()"
                  [disabled]="(characterCount() === 0 && !selectedImage()) || isOverLimit()"
                  text="Thread"
                  customClasses="py-1.5 !text-sm !w-27"
                >
                </app-thread-button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
