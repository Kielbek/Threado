<div
  class="relative flex w-full items-start gap-3 rounded-2xl border border-gray-200 dark:border-zinc-800 bg-white dark:bg-[#0a0a0a] p-4 shadow-xl dark:shadow-2xl transition-all duration-300 pointer-events-auto overflow-hidden group"
  [ngClass]="toast().isClosing ? 'toast-leave' : 'toast-enter'">

  <div
    class="absolute bottom-0 left-0 h-[2px] animate-progress w-full opacity-100 dark:opacity-80"
    [ngClass]="getColorClass(toast().type, 'bg')">
  </div>

  <div class="flex-shrink-0 mt-0.5" [ngClass]="getColorClass(toast().type, 'text')">
    <lucide-icon [img]="getIcon(toast().type)" class="w-5 h-5"></lucide-icon>
  </div>

  <div class="flex flex-col flex-1">
    @if (toast().title) {
      <span class="font-bold text-[15px] text-gray-900 dark:text-white leading-none mb-1.5 tracking-wide">{{ toast().title }}</span>
    }
    <span class="text-[14px] text-gray-500 dark:text-zinc-400 leading-snug">{{ toast().message }}</span>
  </div>

  <button
    (click)="close.emit()"
    class="flex-shrink-0 p-1.5 -mr-1.5 -mt-1.5 rounded-full text-gray-400 hover:text-gray-900 hover:bg-gray-100 dark:text-zinc-600 dark:hover:text-white dark:hover:bg-white/10 transition-all">
    <lucide-icon [img]="XIcon" class="w-4 h-4"></lucide-icon>
  </button>

</div>
