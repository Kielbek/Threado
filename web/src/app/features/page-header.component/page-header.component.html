<header class="sticky top-0 z-40 bg-white/80 dark:bg-black/80 backdrop-blur-xl px-4 py-3 border-b threado-border flex items-center gap-5 min-h-[59px]">

  @if (showBackButton()) {
    <button
      (click)="goBack()"
      class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition cursor-pointer text-black dark:text-white flex-shrink-0"
      title="Wróć">
      <lucide-icon [img]="ArrowLeftIcon" class="w-5 h-5"></lucide-icon>
    </button>
  }

  <div class="flex flex-col justify-center overflow-hidden">
    <h1 class="text-xl font-bold tracking-tight text-black dark:text-white truncate">
      {{ title() }}
    </h1>

    @if (subtitle()) {
      <span class="text-xs text-gray-500 truncate">{{ subtitle() }}</span>
    }
  </div>

  <div class="ml-auto flex-shrink-0">
    <ng-content></ng-content>
  </div>
</header>
