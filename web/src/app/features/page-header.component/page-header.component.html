<header class="flex items-center gap-5 min-h-[59px] border-b px-4 py-3 threado-border bg-white dark:bg-black lg:sticky lg:top-0 lg:z-40 lg:bg-white/80 lg:dark:bg-black/80 lg:backdrop-blur-xl">

  @if (showBackButton()) {
    <button
      (click)="goBack()"
      class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition cursor-pointer text-black dark:text-white flex-shrink-0"
      title="Wróć">
      <lucide-icon [img]="ArrowLeftIcon" class="w-5 h-5"></lucide-icon>
    </button>
  }

  <div class="flex flex-col justify-center overflow-hidden">
    <h1 class="text-xl font-bold tracking-tight text-black dark:text-white truncate">
      {{ title() }}
    </h1>

    @if (subtitle()) {
      <span class="text-xs text-gray-500 truncate">{{ subtitle() }}</span>
    }
  </div>

  <div class="ml-auto flex items-center gap-3 flex-shrink-0">

    @if (buttonText()) {
      <app-threado-button
        [text]="buttonText()!"
        [disabled]="buttonDisabled()"
        [isLoading]="isButtonLoading()"
        variant="primary"
        (clicked)="buttonClicked.emit()">
      </app-threado-button>
    }

    <ng-content></ng-content>

  </div>
</header>
