<div class="w-full pb-safe flex flex-col">

  @for (thread of threads(); track thread.id) {
    <app-thread [thread]="thread"></app-thread>
  }
  @empty {
    @if (!isLoading() && !isError()) {
      <app-empty-state
        [title]="emptyTitle()"
        [description]="emptyDescription()"
        [icon]="emptyIcon()">
      </app-empty-state>
    }
  }

  @if (isLoading()) {
    <app-thread-skeleton></app-thread-skeleton>
    <app-thread-skeleton></app-thread-skeleton>
    <app-thread-skeleton></app-thread-skeleton>
  }

  @if (isError()) {
    <div class="py-8"> <app-empty-state
      [icon]="AlertTriangleIcon"
      title="Błąd ładowania"
      description="Nie udało się pobrać postów. Sprawdź połączenie i spróbuj ponownie."
      actionText="Spróbuj ponownie"
      (actionClick)="retry()">
    </app-empty-state>
    </div>
  }

  @if (isLastPage() && threads().length > 0) {
    <div class="p-8 text-center text-gray-400 text-sm flex flex-col items-center gap-2">
      <div class="w-1 h-1 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
      Dotarłeś do końca
    </div>
  }

  <div #scrollAnchor class="h-4 w-full opacity-0 pointer-events-none"></div>

</div>
