<button
  (click)="handleClick()"
  [disabled]="disabled() || isLoading()"
  [class]="baseClasses() + ' ' + customClasses()"
  class="relative flex items-center justify-center transition-all duration-200 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">

  @if (isLoading()) {
    <svg
      class="animate-spin w-5 h-5"
      [ngClass]="{
        'text-threado-bg': variant() === 'primary',
        'text-threado-accent': variant() !== 'primary'
      }"
      xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  } @else {
    <span class="block"> {{ text() }}</span>
  }

</button>
