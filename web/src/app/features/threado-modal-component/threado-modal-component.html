@if (isOpen()) {
  <div class="fixed inset-0 z-[1002] flex items-center justify-center p-4">
    <div
      class="fixed inset-0 bg-zinc-900/60 backdrop-blur-md animate-in fade-in duration-300"
      (click)="close.emit()">
    </div>

    <div class="relative w-full max-w-xl bg-black border threado-border rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 slide-in-from-bottom-4 duration-300">
      <div class="px-6 pt-6 flex flex-col">
        <button
          (click)="close.emit()"
          type="button"
          class="w-fit -ml-2 p-2 rounded-full text-white hover:bg-white/10 transition-colors cursor-pointer">
          <lucide-icon [img]="CloseIcon" class="size-6"></lucide-icon>
        </button>

        <div class="mt-4 space-y-1 text-left">
          <h1 class="text-3xl font-bold text-white tracking-tight">{{ title() }}</h1>
          @if (description()) {
            <p class="text-zinc-500 font-medium">{{ description() }}</p>
          }
        </div>
      </div>

      <div class="p-6">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
