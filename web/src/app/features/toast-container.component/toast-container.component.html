<div class="fixed z-[100] flex flex-col gap-3 p-4 pointer-events-none
                bottom-0 left-0 right-0 w-full
                sm:top-0 sm:right-0 sm:bottom-auto sm:left-auto sm:w-96 sm:max-w-sm">

  @for (toast of toastService.toasts(); track toast.id) {
    <app-toast
      [toast]="toast"
      (close)="toastService.remove(toast.id)">
    </app-toast>
  }

</div>
