<div class="sticky top-[59px] z-20 w-full border-b-[3px] threado-border">
  <div class="absolute inset-0 -z-10 bg-white/80 dark:bg-black/80 backdrop-blur-xl"></div>

  <div class="relative flex" role="tablist">
    @for (tab of tabs; track tab) {
      <button
        (click)="selectTab(tab)"
        class="flex-1 py-4 text-sm font-bold transition-colors duration-200 relative z-10"
        [ngClass]="activeTab === tab
          ? 'text-black dark:text-white'
          : 'text-gray-500 hover:text-gray-900 dark:hover:text-gray-300'">
        {{ tab }}
      </button>
    }

    <div
      class="absolute bottom-[-3px] left-0 h-[3px] bg-threado shadow-[0_0_12px_rgba(50,205,50,0.8)] transition-transform duration-300 ease-out"
      [style.width.%]="100 / tabs.length"
      [style.transform]="'translateX(' + (tabs.indexOf(activeTab) * 100) + '%)'">
    </div>
  </div>
</div>
