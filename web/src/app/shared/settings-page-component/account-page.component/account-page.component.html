<div class="flex flex-col font-sans pb-20 sm:pb-0 h-full">

  <app-page-header
    title="Account & Security"
    [showBackButton]="true">
  </app-page-header>

  <main class="flex-1 w-full mx-auto p-4">

    <div class="flex flex-col items-center justify-center py-8 text-center">
      <div class="w-16 h-16 bg-green-100 dark:bg-green-500/10 rounded-full flex items-center justify-center mb-4">
        <lucide-icon [img]="ShieldCheckIcon" class="w-8 h-8 text-green-600 dark:text-green-500"></lucide-icon>
      </div>
      <h2 class="text-xl font-bold text-black dark:text-white">Twoje konto jest bezpieczne</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-2 max-w-sm leading-relaxed">
        Zarządzanie hasłem, uwierzytelnianiem dwuetapowym (2FA) i aktywnymi sesjami odbywa się w zabezpieczonym panelu Keycloak.
      </p>
    </div>

    <div class="mt-6 flex flex-col gap-5">
      <h3 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider px-2">Dane logowania</h3>

      <div class="bg-zinc-50 dark:bg-zinc-900 border threado-border rounded-3xl p-5 flex flex-col gap-5">

        <div class="flex items-center gap-4">
          <div class="p-2.5 bg-white dark:bg-black rounded-xl border border-gray-200 dark:border-zinc-800 shadow-sm">
            <lucide-icon [img]="MailIcon" class="w-4 h-4 text-gray-500"></lucide-icon>
          </div>
          <div class="flex flex-col">
            <span class="text-xs text-gray-500 font-medium">Adres email</span>
            @if (userEmail()) {
              <span class="text-sm font-bold text-black dark:text-white">{{ userEmail() }}</span>
            } @else {
              <span class="text-sm font-medium text-gray-400">Ładowanie...</span>
            }
          </div>
        </div>

        <hr class="threado-border">

        <button
          (click)="redirectToKeycloakAccount()"
          class="group flex items-center justify-between p-2.5 -m-2.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors cursor-pointer text-left">

          <div class="flex items-center gap-4">
            <div class="p-2.5 bg-white dark:bg-black rounded-xl border border-gray-200 dark:border-zinc-800 shadow-sm group-hover:border-[var(--color-threado-accent)] transition-colors">
              <lucide-icon [img]="KeyIcon" class="w-4 h-4 text-gray-500 group-hover:text-[var(--color-threado-accent)] transition-colors"></lucide-icon>
            </div>
            <div class="flex flex-col">
              <span class="text-sm font-bold text-black dark:text-white group-hover:text-[var(--color-threado-accent)] transition-colors">Zmień hasło i zabezpieczenia</span>
              <span class="text-xs text-gray-500">Zarządzaj w panelu uwierzytelniania</span>
            </div>
          </div>

          <lucide-icon [img]="ExternalLinkIcon" class="w-4 h-4 text-gray-400 group-hover:text-[var(--color-threado-accent)] transition-colors"></lucide-icon>
        </button>

      </div>
    </div>

  </main>
</div>
