<div class="flex flex-col min-h-[calc(100dvh-65px)] lg:min-h-screen font-sans pb-20 sm:pb-0">

  <app-page-header
    title="Settings"
    [showBackButton]="false">
  </app-page-header>

  <main class="flex-1 w-full mx-auto sm:border-x border-gray-100 dark:border-zinc-800 flex flex-col p-2 sm:p-4 gap-1 sm:gap-2 mt-2">

    @for (item of menuItems; track item.route) {
      <app-nav-item [item]="item"></app-nav-item>
    }

    <div class="mt-auto p-8 pt-12 text-center">
      <p class="text-[13px] font-medium text-gray-400 dark:text-zinc-600 leading-relaxed">
        Manage your experience on Threado. <br>
        <span class="text-[10px] uppercase tracking-widest opacity-60 mt-1.5 block font-bold">Version 1.0.0</span>
      </p>
    </div>

  </main>
</div>
