<div class="w-full pb-safe">

  <app-page-header title="Home"></app-page-header>

  <app-threado-compose (threadCreated)="feed.addThreadToTop($event)"></app-threado-compose>

  <app-feed-tabs [(activeTab)]="currentTab"></app-feed-tabs>

  <app-thread-feed
    #feed
    [cacheKey]="currentCacheKey()"
    [fetchStrategy]="currentStrategy()"
    [emptyTitle]="emptyTitle()"
    emptyDescription="Nie ma tu nic do wyświetlenia.">
  </app-thread-feed>

</div>
