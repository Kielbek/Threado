<div class="w-full pb-safe min-h-screen">

  <app-page-header title="Powiadomienia"></app-page-header>

  <div class="flex flex-col">
    @for (item of notifications(); track item.id) {

      <app-notification-item [notif]="item" />

    } @empty {

      <div class="px-8 py-16 text-center flex flex-col items-center justify-center min-h-[50vh]">

        <div class="bg-black/5 dark:bg-white/5 p-4 rounded-full mb-4 ring-1 ring-black/10 dark:ring-white/10">
          <lucide-icon [img]="MessageIcon" class="w-8 h-8 opacity-50 text-gray-600 dark:text-gray-400"></lucide-icon>
        </div>

        <h3 class="text-xl font-bold text-black dark:text-white mb-2">Brak powiadomień</h3>

        <p class="text-[15px] text-gray-500 dark:text-gray-400 max-w-sm mx-auto">
          Tutaj pojawią się powiadomienia o polubieniach, odpowiedziach i nowych obserwujących.
        </p>
      </div>

    }
  </div>

</div>
