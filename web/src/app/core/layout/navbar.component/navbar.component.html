<nav class="p-4 flex flex-col h-screen transition-colors duration-300">

  <div class="flex justify-between items-center mb-6 lg:mb-8 px-4">
    <a routerLink="/home" class="inline-block hover:opacity-80 transition">
      <img src="threado-full-logo.png" class="h-14 object-contain" alt="Logo">
    </a>
  </div>

  @if (ksService.isLoggedIn()) {

    <div class="flex flex-col gap-2 flex-grow">
      @for (item of menuItems(); track item.route) {
        <app-nav-item [item]="item"></app-nav-item>
      }

      <div class="mt-4 px-2">
        <app-threado-button
          text="Thread"
          customClasses="w-full py-3 text-lg font-bold">
        </app-threado-button>
      </div>
    </div>

    <div class="mt-auto mb-4 relative">

      @if (isDropdownOpen()) {
        <div class="absolute bottom-full right-0 mb-3 w-[260px] bg-white dark:bg-black border threado-border rounded-lg shadow-xl p-1.5 z-50 transition-all">
          <ul class="flex flex-col">

            <li class="px-3 py-2">
              <app-threado-selector></app-threado-selector>
            </li>

            <li class="mx-2 my-1.5 h-px border-b threado-border"></li>

            <li>
              <button class="w-full text-left px-3 py-2 text-sm font-medium rounded-md hover:bg-gray-100 dark:hover:bg-white/10 transition-colors text-black dark:text-white"
                      (click)="ksService.keycloak.logout()">
                Log out &#64;{{ (userService.currentUser$ | async)?.username || 'unknown' }}
              </button>
            </li>

          </ul>
        </div>
      }

      <button
        (click)="toggleDropdown()"
        class="w-full flex items-center justify-between p-3 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition active:scale-95"
        [ngClass]="{'bg-gray-100 dark:bg-white/10': isDropdownOpen()}">

        <div class="flex items-center gap-3 overflow-hidden">
          <app-threado-avatar
            [avatarUrl]="(userService.currentUser$ | async)?.avatarUrl"
            size="2.5rem">
          </app-threado-avatar>

          <div class="hidden xl:flex flex-col text-left overflow-hidden">
            <span class="font-bold text-sm text-black dark:text-white truncate">
              {{ (userService.currentUser$ | async)?.firstName || 'Guest' }}
            </span>
            <span class="text-xs text-gray-500 truncate">
            &#64;{{ (userService.currentUser$ | async)?.username || 'unknown' }}
            </span>
          </div>
        </div>

        <app-threado-action-button
          [icon]="EllipsisIcon"
          variant="accent">
        </app-threado-action-button>
      </button>

    </div>
  }
</nav>
