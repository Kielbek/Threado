    class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors text-black dark:text-white active:scale-95"
    aria-label="Otwórz menu"
  >
    <lucide-icon [img]="MenuIcon" class="w-6 h-6"></lucide-icon>
  </button>

  <div class="flex items-center">
    <img src="threado-full-logo.png" class="h-10 object-contain" alt="Logo">
  </div>

  <div></div>

</header>
