<nav class="fixed bottom-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-xl border-t border-[#32cd32]/10 lg:hidden px-2 pb-safe">
  <div class="grid grid-cols-5 items-center h-16">

    @for (item of menuItems.slice(0, 2); track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="text-[#32cd32]"
         class="flex items-center justify-center text-gray-500 transition-all duration-200 active:scale-90">
        <lucide-icon [img]="item.icon" class="w-6 h-6"></lucide-icon>
      </a>
    }

    <div class="flex justify-center">
      <button
        type="button"
        class="relative -top-5 flex items-center justify-center w-14 h-14 bg-[#32cd32] rounded-full
               shadow-[0_8px_24px_rgba(50,205,50,0.4)] active:scale-90 transition-all duration-200
               flex-shrink-0 border-4 border-black">
        <lucide-icon [img]="PlusIcon" class="w-8 h-8 text-black"></lucide-icon>
      </button>
    </div>

    @for (item of menuItems.slice(2, 4); track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="text-[#32cd32]"
         class="flex items-center justify-center text-gray-500 transition-all duration-200 active:scale-90">
        <lucide-icon [img]="item.icon" class="w-6 h-6"></lucide-icon>
      </a>
    }

  </div>
</nav>
