server:
  port: 8222

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      server:
        webmvc:
          routes:
            - id: user_service_route
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            - id: thread_service_route
              uri: lb://thread-service
              predicates:
                - Path=/api/threads/**