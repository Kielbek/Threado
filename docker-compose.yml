services:
  # --- FRONTEND ---
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: threado-frontend
    ports:
      - "4200:80"
    networks:
      - threado-network
    depends_on:
      - user-service

  # --- BAZA DANYCH ---
  user-db:
    image: postgres:15-alpine
    container_name: threado-user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - threado-network

  # --- CONFIG SERVER ---
  config-server:
    build: 
      context: ./core/config-server
    container_name: threado-config-server
    ports:
      - "8888:8888" 
    environment:
      - SPRING_PROFILES_ACTIVE=native
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - threado-network

  # --- DISCOVERY SERVER (EUREKA) ---
  discovery-server:
    build: 
      context: ./core/discovery
    container_name: threado-discovery-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://threado-config-server:8888
    depends_on:
      - config-server
    networks:
      - threado-network

  # --- USER SERVICE ---
  user-service:
    build: 
      context: ./core/user
    container_name: threado-user-service
    ports:
      - "8090:8090"
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://threado-config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://threado-user-db:5432/user_db
      - SPRING_THREADS_VIRTUAL_ENABLED=true
    depends_on:
      user-db:
        condition: service_healthy
      config-server:
        condition: service_started
      discovery-server:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - threado-network

  # --- KEYCLOAK ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: threado-keycloak
    command: start-dev --http-enabled=true --hostname-strict=false --http-host=0.0.0.0
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_CACHE_THEMES: "false"
      KC_CACHE_TEMPLATES: "false"
      
      KC_SPI_EVENTS_LISTENER_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      KC_SPI_EVENTS_LISTENER_KAFKA_CLIENT_ID: threado-keycloak-producer
      KC_SPI_EVENTS_LISTENER_KAFKA_TOPIC_USER: threado.user.events
      KC_SPI_EVENTS_LISTENER_KAFKA_ENABLE_USER_EVENTS: "true"
      KC_SPI_EVENTS_LISTENER_KAFKA_SYNC: "false" 
      
    ports:
      - "8180:8080"
    depends_on:
      - kafka
    volumes:
      - ./themes/threado-theme:/opt/keycloak/themes/threao-theme
      - ./keycloak-providers:/opt/keycloak/providers
    networks:
      - threado-network
      
  # --- KAFKA ---
  kafka:
      image: apache/kafka:3.7.0
      container_name: threado-kafka
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
        KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      networks:
        - threado-network

  # --- KAFKA-UI (Nowoczesne, stabilne GUI zamiast Kafdropa) ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: threado-kafka-ui
    ports:
      - "9000:8080" 
    environment:
      - KAFKA_CLUSTERS_0_NAME=Threado-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9093
    depends_on:
      - kafka
    networks:
      - threado-network

networks:
  threado-network:
    driver: bridge

volumes:
  user_data:
